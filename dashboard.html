<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cron Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }

    .status-pill {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 2px 10px;
      display: inline-block;
    }
    .status-ok      { background: #198754; color: #fff; }
    .status-warning { background: #fd7e14; color: #fff; }
    .status-error   { background: #dc3545; color: #fff; }
    .status-running { background: #0d6efd; color: #fff; }
    .status-no_log  { background: #6c757d; color: #fff; }

    .job-card { transition: box-shadow .15s; border-radius: 12px; }
    .job-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.18); }

    .step-badge {
      font-size: 0.7rem;
      border-radius: 6px;
      padding: 2px 7px;
      margin: 2px 2px;
      display: inline-block;
    }
    .step-ok      { background: #198754; color: #fff; }
    .step-warning { background: #fd7e14; color: #fff; }
    .step-error   { background: #dc3545; color: #fff; }
    .step-skip    { background: #6c757d; color: #fff; }
    .step-pending { background: #343a40; color: #adb5bd; border: 1px solid #495057; }

    .log-tail {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .count-badge {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .progress { height: 14px; border-radius: 8px; }
    .progress-bar { transition: width 0.8s ease; border-radius: 8px; }

    #theme-toggle { cursor: pointer; }

    .ts { font-size: 0.78rem; opacity: .7; }

    [data-bs-theme="light"] .log-tail { background: #f8f9fa; color: #212529; }
    [data-bs-theme="dark"]  .log-tail { background: #1a1d20; color: #adb5bd; }
    [data-bs-theme="light"] .step-pending { background: #dee2e6; color: #495057; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4 border-bottom">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-activity me-2"></i>Cron Dashboard
    </span>
    <div class="d-flex align-items-center gap-3">
      <span id="generated-at" class="ts text-muted"></span>
      <button id="refresh-btn" class="btn btn-sm btn-outline-secondary" onclick="loadData()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
      <button id="theme-toggle" class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()">
        <i class="bi bi-moon-fill" id="theme-icon"></i>
      </button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  <div id="error-alert" class="alert alert-danger d-none" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span id="error-msg"></span>
  </div>
  <div id="cards" class="row g-4"></div>
</div>

<footer class="text-center text-muted ts mt-5 pb-3">
  Data generated by <code>generate_dashboard_data.py</code> · pushed daily at 16:00
</footer>

<script>
const STATUS_ICONS = {
  ok:      '<i class="bi bi-check-circle-fill text-success me-1"></i>',
  warning: '<i class="bi bi-exclamation-triangle-fill text-warning me-1"></i>',
  error:   '<i class="bi bi-x-circle-fill text-danger me-1"></i>',
  running: '<i class="bi bi-arrow-repeat text-primary me-1"></i>',
  no_log:  '<i class="bi bi-dash-circle text-secondary me-1"></i>',
};

const BAR_COLORS = {
  ok:      'bg-success',
  warning: 'bg-warning',
  error:   'bg-danger',
  running: 'bg-primary progress-bar-striped progress-bar-animated',
  no_log:  'bg-secondary',
};

function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const dt = new Date(isoStr.replace(' ', 'T'));
  const diff = Math.floor((Date.now() - dt) / 1000);
  if (diff < 60)       return `${diff}s ago`;
  if (diff < 3600)     return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400)    return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function timeUntil(isoStr) {
  if (!isoStr) return '—';
  const dt = new Date(isoStr.replace(' ', 'T'));
  const diff = Math.floor((dt - Date.now()) / 1000);
  if (diff < 0)        return 'overdue';
  if (diff < 60)       return `in ${diff}s`;
  if (diff < 3600)     return `in ${Math.floor(diff/60)}m`;
  return `in ${Math.floor(diff/3600)}h ${Math.floor((diff%3600)/60)}m`;
}

function renderStep(s) {
  const cls = `step-${s.status}`;
  return `<span class="step-badge ${cls}">${s.name}</span>`;
}

function renderCounts(counts) {
  return Object.entries(counts).map(([k, v]) =>
    `<span class="count-badge badge bg-secondary me-1">${k}: <strong>${v}</strong></span>`
  ).join('');
}

function renderCard(job) {
  const icon   = STATUS_ICONS[job.status] || '';
  const pill   = `<span class="status-pill status-${job.status}">${job.status}</span>`;
  const barCls = BAR_COLORS[job.status] || 'bg-secondary';
  const pct    = job.progress ?? 0;

  const steps = job.steps && job.steps.length
    ? `<div class="mb-2">${job.steps.map(renderStep).join('')}</div>`
    : '';

  const counts = job.counts && Object.keys(job.counts).length
    ? `<div class="mb-2">${renderCounts(job.counts)}</div>`
    : '';

  const logLines = job.log_tail && job.log_tail.length
    ? job.log_tail.join('\n')
    : '(no log)';

  const logId = `log-${job.name.replace(/\W+/g, '-')}`;

  return `
<div class="col-12 col-md-6 col-xl-4">
  <div class="card job-card h-100">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <h6 class="card-title fw-bold mb-0">${icon}${job.name}</h6>
        ${pill}
      </div>

      <div class="mb-2">
        <div class="progress">
          <div class="progress-bar ${barCls}" role="progressbar"
               style="width:${pct}%" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100">
          </div>
        </div>
        <div class="d-flex justify-content-between ts mt-1">
          <span>${pct}% complete</span>
          <span><i class="bi bi-clock me-1"></i>${job.schedule}</span>
        </div>
      </div>

      ${steps}
      ${counts}

      <div class="d-flex gap-3 ts mb-2">
        <span title="${job.last_run || 'unknown'}">
          <i class="bi bi-arrow-counterclockwise me-1"></i>Last: <strong>${timeAgo(job.last_run)}</strong>
        </span>
        <span title="${job.next_run || 'unknown'}">
          <i class="bi bi-arrow-right-circle me-1"></i>Next: <strong>${timeUntil(job.next_run)}</strong>
        </span>
      </div>

      <div>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2 ts"
                data-bs-toggle="collapse" data-bs-target="#${logId}">
          <i class="bi bi-terminal me-1"></i>Log tail
        </button>
        <div id="${logId}" class="collapse mt-2">
          <div class="log-tail rounded p-2">${escHtml(logLines)}</div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.innerHTML = '<i class="bi bi-arrow-clockwise spin me-1"></i> Loading…';

  // Remove any previously injected script so re-runs work
  const old = document.getElementById('data-script');
  if (old) old.remove();

  const script = document.createElement('script');
  script.id = 'data-script';
  script.src = 'dashboard_data.js?_=' + Date.now();
  script.onload = function() {
    try {
      const data = window.DASHBOARD_DATA;
      if (!data) throw new Error('DASHBOARD_DATA not found in dashboard_data.js');
      document.getElementById('generated-at').textContent = 'Generated: ' + (data.generated_at || '?');
      document.getElementById('cards').innerHTML = data.jobs.map(renderCard).join('');
      document.getElementById('error-alert').classList.add('d-none');
    } catch(e) {
      document.getElementById('error-msg').textContent = e.message;
      document.getElementById('error-alert').classList.remove('d-none');
    }
    btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Refresh';
  };
  script.onerror = function() {
    document.getElementById('error-msg').textContent =
      'Could not load dashboard_data.js — run generate_dashboard_data.py first.';
    document.getElementById('error-alert').classList.remove('d-none');
    btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Refresh';
  };
  document.head.appendChild(script);
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-bs-theme') === 'dark';
  html.setAttribute('data-bs-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-icon').className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}

// Restore saved theme
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-bs-theme', saved);
    document.getElementById('theme-icon').className =
      saved === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun-fill';
  }
})();

loadData();
// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<style>
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
</style>
</body>
</html>
